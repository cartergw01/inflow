# Real-time-ish ingestion driver. Vercel Hobby crons are capped at once/day,
# so this free scheduled workflow is the metronome instead (see NOTES.md).
# Requires: INGEST_SECRET secret, APP_URL repository variable.
name: Ingest

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    if: ${{ vars.APP_URL != '' }}
    steps:
      - name: Trigger ingestion endpoint
        run: |
          curl -fsS -m 120 -X POST \
            -H "x-ingest-secret: ${{ secrets.INGEST_SECRET }}" \
            "${{ vars.APP_URL }}/api/ingest" | head -c 2000
